appId: com.daypage.app
---
# Flow 02: Tab 导航 — 验证三个 Tab 可以正常切换
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
- takeScreenshot: launch

# 验证默认在 Today Tab
- assertVisible: "Today"
- takeScreenshot: today_tab

# 切换到 Archive Tab
- tapOn: "Archive"
- takeScreenshot: archive_tab
- assertVisible: "Archive"

# 切换回 Today Tab
- tapOn: "Today"
- takeScreenshot: back_to_today
- assertVisible: "Today"
