appId: com.daypage.app
---
# Flow 02: Sidebar 导航 — 验证通过侧边栏可以切换 Today / Archive
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
      hasSeenWelcome: "true"
      hasRequestedNotifications: "true"
- takeScreenshot: launch

# 等待 Today View 加载（DAYPAGE 可见）
- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000
- takeScreenshot: today_view

# 打开侧边栏（通过 accessibilityIdentifier 定位汉堡按钮）
- tapOn:
    id: "sidebar-menu-button"
- waitForAnimationToEnd
- takeScreenshot: sidebar_open

# 在侧边栏点击 Archive (en) / 归档 (zh-Hans). The CI runner's default
# locale may be zh-Hans, so an exact "Archive" match would miss. Regex
# `Archive|归档` covers both. `forceLocale` is not bridged into the app
# yet (only `hasOnboarded`/`authSkipped` are), so we can't pin to en.
- tapOn:
    text: "Archive|归档"
- waitForAnimationToEnd
- takeScreenshot: archive_view

# 验证 Archive View 已显示 — match the header pill in either locale.
- assertVisible:
    text: "ARCHIVE|归档"

# 重新打开侧边栏
- tapOn:
    id: "sidebar-menu-button"
- waitForAnimationToEnd
- takeScreenshot: sidebar_open_again

# 返回 Today View
- tapOn:
    text: "Today|今日"
- waitForAnimationToEnd
- takeScreenshot: back_to_today

# 验证回到 Today View
- assertVisible: "DAYPAGE"
