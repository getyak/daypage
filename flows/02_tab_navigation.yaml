appId: com.daypage.app
---
# Flow 02: Tab navigation — verify Today/Archive/Graph tabs via TabView
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
- takeScreenshot: launch

- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000
- takeScreenshot: today_view

# Switch to Archive tab
- tapOn: "Archive"
- waitForAnimationToEnd
- takeScreenshot: archive_view
- assertVisible: "ARCHIVE"

# Switch to Graph tab
- tapOn: "Graph"
- waitForAnimationToEnd
- takeScreenshot: graph_view

# Back to Today
- tapOn: "Today"
- waitForAnimationToEnd
- takeScreenshot: back_to_today
- assertVisible: "DAYPAGE"
