appId: com.daypage.app
---
# Flow 03: Smoke Test — App 启动不崩溃，基本 UI 可见
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
- takeScreenshot: launch

# 等待主界面加载（DAYPAGE 品牌文字可见，侧边栏导航已替代 Tab bar）
- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000

- takeScreenshot: stable

# 验证没有错误弹窗
- assertNotVisible: "错误"
- assertNotVisible: "Error"
- assertNotVisible: "崩溃"

- takeScreenshot: no_error_dialogs
