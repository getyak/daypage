appId: com.daypage.app
---
# Flow 01: Today View — verify memo input + submit pipeline
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
- takeScreenshot: launch

- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000
- takeScreenshot: today_view_loaded

# Expand text composer (tap pen button; skip if V4 dock already expanded)
- tapOn:
    id: "expand-text-composer"
    optional: true
- waitForAnimationToEnd

# Wait for memo-input to become visible (may need composer expansion)
- extendedWaitUntil:
    visible:
      id: "memo-input"
    timeout: 8000
- takeScreenshot: composer_expanded

# Type and send a memo
- tapOn:
    id: "memo-input"
- inputText: "UI test: hello world"
- takeScreenshot: after_input
- assertVisible: "UI test: hello world"

- tapOn:
    id: "memo-send"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: after_send
