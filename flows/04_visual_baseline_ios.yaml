appId: com.daypage.app
---
# Flow 04: Visual Baseline — iOS UI screenshot capture
# Captures 24 baseline screenshots:
# Today / Archive / Graph  ×  light/dark  ×  empty/with-memos  ×  en/zh
# Screenshots land in maestro-results/baseline/ under their stable names.

# ─────────────────────────────────────────────
# LIGHT · EMPTY · EN
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
      forceLocale: "en"
      forceTheme: "light"
      loadFixture: "empty"

- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000

- takeScreenshot: baseline/today_light_empty_en

- tapOn:
    id: "sidebar-menu-button"
- waitForAnimationToEnd
- tapOn:
    text: "Archive|归档"
- waitForAnimationToEnd
- takeScreenshot: baseline/archive_light_empty_en

- tapOn:
    id: "sidebar-menu-button"
- waitForAnimationToEnd
- tapOn:
    text: "Graph|图谱"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: baseline/graph_light_empty_en

