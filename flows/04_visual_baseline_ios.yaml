appId: com.daypage.app
---
# Flow 04: Visual Baseline — iOS UI screenshot capture (simplified)
# Captures Today/Archive/Graph screenshots via TabView taps
# 8 variants × 3 tabs = 24 screenshots

# ─────────────────────────────────────────────
# LIGHT · EMPTY · EN
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      hasOnboarded: "true"
      authSkipped: "true"
      forceLocale: "en"
      forceTheme: "light"
      loadFixture: "empty"
- extendedWaitUntil:
    visible: "DAYPAGE"
    timeout: 10000
- takeScreenshot: baseline/today_light_empty_en
- tapOn: "Archive"
- waitForAnimationToEnd
- takeScreenshot: baseline/archive_light_empty_en
- tapOn: "Graph"
- waitForAnimationToEnd
- takeScreenshot: baseline/graph_light_empty_en

