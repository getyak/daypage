appId: com.daypage.DayPageWatch
---
# Flow 05: Visual Baseline — Watch RecordingView states
# Captures 4 baseline screenshots: idle / recording / done / failed

# ─────────────────────────────────────────────
# idle state
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      forceState: "idle"

- extendedWaitUntil:
    visible: "Record"
    timeout: 8000

- takeScreenshot: baseline/watch_recording_idle

# ─────────────────────────────────────────────
# recording state
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      forceState: "recording"

- extendedWaitUntil:
    visible: "Stop"
    timeout: 8000

- takeScreenshot: baseline/watch_recording_active

# ─────────────────────────────────────────────
# done state
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      forceState: "done"

- extendedWaitUntil:
    visible: "Saved"
    timeout: 8000

- takeScreenshot: baseline/watch_recording_done

# ─────────────────────────────────────────────
# failed state
# ─────────────────────────────────────────────
- launchApp:
    arguments:
      forceState: "failed"

- extendedWaitUntil:
    visible: "Failed"
    timeout: 8000

- takeScreenshot: baseline/watch_recording_failed
