<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agentry</title>
  <style>
    /* ---- Design tokens: dark, clean, monospace-ish ------------------------ */
    :root {
      --bg:        #0b0b0c;
      --bg-soft:   #141417;
      --bg-card:   #1a1a1f;
      --border:    #2a2a30;
      --fg:        #e6e6e6;
      --fg-dim:    #9aa0a6;
      --fg-faint:  #6b7178;
      --accent:    #7aa2f7;   /* user / links */
      --accent-2:  #43d17a;   /* online dot / assistant accent */
      --tool:      #e0af68;   /* tool calls */
      --err:       #f7768e;   /* errors */
      --radius:    10px;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, "JetBrains Mono",
              "Fira Code", Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.55;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ---- Header ----------------------------------------------------------- */
    header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-soft);
    }
    header h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: 0.02em;
    }
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--fg-faint);
      box-shadow: 0 0 0 0 rgba(67, 209, 122, 0.5);
      transition: background 0.2s ease;
    }
    .dot.online { background: var(--accent-2); }
    .dot.busy   { background: var(--tool); animation: pulse 1.1s ease-in-out infinite; }
    .dot.error  { background: var(--err); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }
    .status {
      margin-left: auto;
      font-size: 0.78rem;
      color: var(--fg-dim);
      white-space: nowrap;
    }

    /* ---- Transcript ------------------------------------------------------- */
    main {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1rem;
      scroll-behavior: smooth;
    }
    .transcript {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .msg {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      animation: rise 0.16s ease-out;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }
    .msg .role {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-faint);
    }
    .bubble {
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--bg-card);
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .msg.user { align-items: flex-end; }
    .msg.user .role  { color: var(--accent); }
    .msg.user .bubble {
      background: #16202e;
      border-color: #25405f;
      max-width: 85%;
    }

    .msg.assistant .role  { color: var(--accent-2); }

    /* Tool call / result cards: compact, distinct from chat bubbles. */
    .tool {
      max-width: 100%;
      border-left: 2px solid var(--tool);
      background: #16140f;
      border-radius: 6px;
      padding: 0.45rem 0.7rem;
      font-size: 0.82rem;
      color: var(--fg-dim);
    }
    .tool .tname { color: var(--tool); font-weight: 600; }
    .tool.result { border-left-color: var(--accent-2); background: #0f1611; }
    .tool.result .tname { color: var(--accent-2); }
    .tool.error  { border-left-color: var(--err); background: #1a1012; color: #f0c4cc; }
    .tool.error .tname { color: var(--err); }
    .tool pre {
      margin: 0.35rem 0 0;
      padding: 0.4rem 0.55rem;
      background: rgba(0,0,0,0.35);
      border-radius: 5px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--fg);
      font-size: 0.8rem;
      max-height: 320px;
      overflow-y: auto;
    }

    .meta-line {
      max-width: 820px;
      margin: 0 auto;
      font-size: 0.72rem;
      color: var(--fg-faint);
      text-align: center;
    }

    .empty {
      color: var(--fg-faint);
      text-align: center;
      margin-top: 18vh;
      font-size: 0.9rem;
      line-height: 1.9;
    }
    .empty code {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 0.08rem 0.35rem;
      border-radius: 4px;
      color: var(--fg-dim);
    }

    /* typing/working indicator */
    .working {
      display: inline-flex;
      gap: 4px;
      align-items: center;
    }
    .working span {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--fg-dim);
      animation: blink 1s infinite ease-in-out;
    }
    .working span:nth-child(2) { animation-delay: 0.15s; }
    .working span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; }
      40%           { opacity: 1; }
    }

    /* ---- Composer --------------------------------------------------------- */
    footer {
      flex: 0 0 auto;
      border-top: 1px solid var(--border);
      background: var(--bg-soft);
      padding: 0.7rem 1rem calc(0.7rem + env(safe-area-inset-bottom));
    }
    form {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1 1 auto;
      resize: none;
      min-height: 42px;
      max-height: 200px;
      padding: 0.6rem 0.75rem;
      background: var(--bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.5;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--fg-faint); }
    button {
      flex: 0 0 auto;
      height: 42px;
      padding: 0 1.1rem;
      background: var(--accent);
      color: #0b0b0c;
      border: none;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s ease, transform 0.05s ease;
    }
    button:hover:not(:disabled) { opacity: 0.9; }
    button:active:not(:disabled) { transform: translateY(1px); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    .hint {
      max-width: 820px;
      margin: 0.4rem auto 0;
      font-size: 0.68rem;
      color: var(--fg-faint);
    }

    /* scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #2c2c33; border-radius: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <header>
    <span id="dot" class="dot" title="connection status"></span>
    <h1>Agentry</h1>
    <span id="status" class="status">connecting…</span>
  </header>

  <main id="main">
    <div id="transcript" class="transcript">
      <div id="empty" class="empty">
        Start a conversation.<br />
        Messages stream from the agent runtime over SSE.
      </div>
    </div>
  </main>

  <footer>
    <form id="composer">
      <textarea
        id="input"
        rows="1"
        placeholder="Send a message…  (Enter to send · Shift+Enter for newline)"
        autocomplete="off"
        autofocus></textarea>
      <button id="send" type="submit" disabled>Send</button>
    </form>
    <div class="hint">POST /v1/sessions/&lt;id&gt;/messages · streamed via Server-Sent Events</div>
  </footer>

  <script>
  (() => {
    "use strict";

    // ---- DOM refs --------------------------------------------------------
    const els = {
      transcript: document.getElementById("transcript"),
      empty:      document.getElementById("empty"),
      main:       document.getElementById("main"),
      input:      document.getElementById("input"),
      send:       document.getElementById("send"),
      form:       document.getElementById("composer"),
      dot:        document.getElementById("dot"),
      status:     document.getElementById("status"),
    };

    // ---- State -----------------------------------------------------------
    let sessionId = null;   // created lazily on first send / at startup
    let busy = false;       // a run is currently streaming

    // ---- Status helpers --------------------------------------------------
    function setStatus(text, cls) {
      els.status.textContent = text;
      els.dot.className = "dot" + (cls ? " " + cls : "");
    }

    // ---- Transcript rendering -------------------------------------------
    function hideEmpty() {
      if (els.empty) { els.empty.remove(); els.empty = null; }
    }

    function scrollToBottom() {
      // Defer to next frame so layout has settled after the DOM insert.
      requestAnimationFrame(() => {
        els.main.scrollTop = els.main.scrollHeight;
      });
    }

    // Append a chat bubble (user or assistant) and return its bubble node so
    // callers can mutate it (e.g. an assistant placeholder while streaming).
    function addMessage(role, text) {
      hideEmpty();
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;

      const r = document.createElement("div");
      r.className = "role";
      r.textContent = role;

      const b = document.createElement("div");
      b.className = "bubble";
      if (text === undefined || text === null) {
        // Placeholder "working" indicator for a pending assistant turn.
        b.innerHTML =
          '<span class="working"><span></span><span></span><span></span></span>';
      } else {
        b.textContent = text;
      }

      wrap.appendChild(r);
      wrap.appendChild(b);
      els.transcript.appendChild(wrap);
      scrollToBottom();
      return b;
    }

    // Render a tool_call / tool_result event as a compact card.
    function addToolCard(kind, name, body, isError) {
      hideEmpty();
      const card = document.createElement("div");
      card.className = "tool" + (kind === "result" ? " result" : "") +
                       (isError ? " error" : "");

      const head = document.createElement("div");
      const label = kind === "result"
        ? (isError ? "tool error" : "tool result")
        : "tool call";
      head.innerHTML =
        '<span class="tname">' + escapeHtml(name || "tool") + "</span> · " +
        escapeHtml(label);
      card.appendChild(head);

      if (body !== undefined && body !== null && body !== "") {
        const pre = document.createElement("pre");
        pre.textContent = typeof body === "string" ? body : prettyJSON(body);
        card.appendChild(pre);
      }

      els.transcript.appendChild(card);
      scrollToBottom();
    }

    function addMeta(text) {
      const m = document.createElement("div");
      m.className = "meta-line";
      m.textContent = text;
      els.transcript.appendChild(m);
      scrollToBottom();
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = String(s);
      return d.innerHTML;
    }

    function prettyJSON(v) {
      try { return JSON.stringify(v, null, 2); }
      catch (_) { return String(v); }
    }

    // ---- API: create a session ------------------------------------------
    async function ensureSession() {
      if (sessionId) return sessionId;
      const res = await fetch("/v1/sessions", { method: "POST" });
      if (!res.ok) throw new Error("create session failed: HTTP " + res.status);
      const data = await res.json();
      if (!data || !data.id) throw new Error("create session: no id in response");
      sessionId = data.id;
      return sessionId;
    }

    // ---- SSE over POST ---------------------------------------------------
    // EventSource only does GET, so we POST the message and read the SSE
    // response body as a stream, parsing `event:`/`data:` frames by hand.
    //
    // onFrame(eventName, dataString) is invoked for each complete SSE frame.
    async function streamMessages(id, input, onFrame) {
      const res = await fetch("/v1/sessions/" + encodeURIComponent(id) + "/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ input }),
      });

      if (!res.ok) {
        // Non-2xx: the body is a JSON {error} from the transport, not a stream.
        let msg = "HTTP " + res.status;
        try { const j = await res.json(); if (j && j.error) msg = j.error; }
        catch (_) { /* ignore */ }
        throw new Error(msg);
      }
      if (!res.body) throw new Error("streaming unsupported by this browser");

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      // SSE frames are separated by a blank line. We accumulate bytes, split on
      // the frame boundary, and parse each frame's event:/data: lines. A frame
      // may carry multiple data: lines (joined with "\n" per the SSE spec).
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let sep;
        while ((sep = indexOfFrameBoundary(buffer)) !== -1) {
          const rawFrame = buffer.slice(0, sep.index);
          buffer = buffer.slice(sep.index + sep.len);
          const frame = parseFrame(rawFrame);
          if (frame) onFrame(frame.event, frame.data);
        }
      }
      // Flush any trailing frame that arrived without a final blank line.
      const tail = parseFrame(buffer);
      if (tail) onFrame(tail.event, tail.data);
    }

    // Find the first SSE frame boundary (blank line). Tolerates both "\n\n"
    // and "\r\n\r\n" line endings. Returns {index, len} or -1.
    function indexOfFrameBoundary(buf) {
      const a = buf.indexOf("\n\n");
      const b = buf.indexOf("\r\n\r\n");
      if (a === -1 && b === -1) return -1;
      if (a === -1) return { index: b, len: 4 };
      if (b === -1) return { index: a, len: 2 };
      return a < b ? { index: a, len: 2 } : { index: b, len: 4 };
    }

    // Parse one raw SSE frame into {event, data}. `data` is the concatenation
    // of all data: lines. Comment lines (starting ":") and blanks are ignored.
    function parseFrame(raw) {
      if (!raw || !raw.trim()) return null;
      let event = "message";
      const dataLines = [];
      for (const line of raw.split(/\r?\n/)) {
        if (!line || line.startsWith(":")) continue;
        const idx = line.indexOf(":");
        const field = idx === -1 ? line : line.slice(0, idx);
        let val = idx === -1 ? "" : line.slice(idx + 1);
        if (val.startsWith(" ")) val = val.slice(1); // strip one leading space
        if (field === "event") event = val;
        else if (field === "data") dataLines.push(val);
      }
      if (dataLines.length === 0) return null;
      return { event, data: dataLines.join("\n") };
    }

    // ---- Wire an SSE event to the transcript ----------------------------
    // The transport emits one frame per session.Event, with `event:` set to the
    // event type, terminated by an `event: done` frame. See internal/transport/http.
    function handleEvent(eventName, dataStr, ctx) {
      let payload = null;
      try { payload = JSON.parse(dataStr); } catch (_) { payload = { text: dataStr }; }

      switch (eventName) {
        case "user":
          // The user message is already shown optimistically on send; skip the
          // echoed event to avoid a duplicate bubble.
          break;

        case "assistant": {
          const text = (payload && payload.text) || "";
          if (!text) break;
          // First assistant text replaces the "working" placeholder; further
          // assistant turns (after tool use) get their own bubbles.
          if (ctx.placeholder) {
            ctx.placeholder.textContent = text;
            ctx.placeholder = null;
          } else {
            addMessage("assistant", text);
          }
          break;
        }

        case "tool_call":
          addToolCard("call", payload && payload.tool,
                      payload && payload.args, false);
          break;

        case "tool_result":
          addToolCard("result", payload && payload.tool,
                      payload && payload.text,
                      !!(payload && payload.is_error));
          break;

        case "meta": {
          const m = payload && payload.meta;
          if (m && (m.input_tokens != null || m.output_tokens != null)) {
            addMeta("tokens · in " + (m.input_tokens ?? "?") +
                    " · out " + (m.output_tokens ?? "?"));
          }
          break;
        }

        case "error":
          addToolCard("result", "error",
                      (payload && (payload.text || payload.error)) || dataStr, true);
          break;

        case "done":
          ctx.done = true;
          if (payload && payload.error) {
            // Run failed: surface it. Replace a dangling placeholder if present.
            if (ctx.placeholder) {
              ctx.placeholder.parentElement.classList.remove("assistant");
              ctx.placeholder.parentElement.remove();
              ctx.placeholder = null;
            }
            addToolCard("result", "run error", payload.error, true);
          } else if (ctx.placeholder) {
            // Completed with no assistant text at all: drop the placeholder.
            ctx.placeholder.parentElement.remove();
            ctx.placeholder = null;
          }
          break;

        default:
          // Unknown event types are ignored rather than rendered as noise.
          break;
      }
    }

    // ---- Send flow -------------------------------------------------------
    async function send(text) {
      if (busy) return;
      busy = true;
      setBusy(true);

      addMessage("user", text);
      const placeholder = addMessage("assistant", null); // working indicator
      const ctx = { placeholder, done: false };

      try {
        const id = await ensureSession();
        setStatus("session " + id + " · running", "busy");
        await streamMessages(id, text, (ev, data) => handleEvent(ev, data, ctx));
        setStatus("session " + id + " · idle", "online");
      } catch (err) {
        // Network/transport failure: replace the placeholder with an error card.
        if (ctx.placeholder) {
          ctx.placeholder.parentElement.remove();
          ctx.placeholder = null;
        }
        addToolCard("result", "error", String(err && err.message || err), true);
        setStatus("error", "error");
      } finally {
        busy = false;
        setBusy(false);
        els.input.focus();
      }
    }

    function setBusy(b) {
      els.send.disabled = b || els.input.value.trim() === "";
      els.input.readOnly = b;
    }

    // ---- Composer wiring -------------------------------------------------
    function autosize() {
      els.input.style.height = "auto";
      els.input.style.height = Math.min(els.input.scrollHeight, 200) + "px";
    }

    els.input.addEventListener("input", () => {
      autosize();
      els.send.disabled = busy || els.input.value.trim() === "";
    });

    els.input.addEventListener("keydown", (e) => {
      // Enter sends; Shift+Enter inserts a newline.
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        els.form.requestSubmit();
      }
    });

    els.form.addEventListener("submit", (e) => {
      e.preventDefault();
      const text = els.input.value.trim();
      if (!text || busy) return;
      els.input.value = "";
      autosize();
      els.send.disabled = true;
      send(text);
    });

    // ---- Startup: probe health, pre-create a session --------------------
    async function init() {
      try {
        const h = await fetch("/healthz");
        if (h.ok) {
          await ensureSession();
          setStatus("session " + sessionId + " · idle", "online");
        } else {
          setStatus("server unavailable", "error");
        }
      } catch (_) {
        // Server may not have a session route reachable yet; UI still works,
        // the session will be created lazily on first send.
        setStatus("offline — will retry on send", "error");
      }
      els.send.disabled = els.input.value.trim() === "";
    }

    init();
  })();
  </script>
</body>
</html>
