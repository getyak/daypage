name: CI

on:
  push:
    branches-ignore:
      - main          # main 由 testflight.yml 负责
    paths-ignore:
      - "design/**"
      - "scripts/ralph/**"
      - "tasks/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "design/**"
      - "scripts/ralph/**"
      - "tasks/**"
      - "**.md"
      - ".gitignore"
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00（北京时间 10:00）对 main 跑全量回归

jobs:
  unit-tests:
    name: Swift Unit Tests (xcrun)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: xcrun swift --version

      - name: Run all unit tests (fail-fast=false)
        run: |
          set +e
          OVERALL=0

          run_test() {
            local FILE="$1"
            echo ""
            echo "══════════════════════════════════════════"
            echo "  Running: $FILE"
            echo "══════════════════════════════════════════"
            xcrun swift "$FILE"
            local RC=$?
            if [ $RC -ne 0 ]; then
              echo "  ❌ FAILED: $FILE (exit $RC)"
              OVERALL=1
            else
              echo "  ✅ PASSED: $FILE"
            fi
            return $RC
          }

          run_test scripts/tests/test_raw_storage.swift
          run_test scripts/tests/test_entity_page.swift
          run_test scripts/tests/test_compilation_parsing.swift
          run_test scripts/tests/test_voice_transcript.swift

          echo ""
          echo "══════════════════════════════════════════"
          if [ $OVERALL -eq 0 ]; then
            echo "  ✅ All tests passed"
          else
            echo "  ❌ One or more tests failed"
          fi
          echo "══════════════════════════════════════════"
          exit $OVERALL

  build:
    name: Xcode Build (no signing)
    runs-on: macos-15
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project uses iOS 26 SDK APIs (AVAudioSession.allowBluetoothHFP, etc.).
      # Pick the newest Xcode available on the runner — macos-15 image usually
      # pre-installs several Xcode versions under /Applications/Xcode_*.app.
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Selecting: $LATEST"
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator
          xcrun --show-sdk-version --sdk iphonesimulator

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-ci-${{ hashFiles('DayPage.xcodeproj/project.pbxproj') }}-${{ runner.os }}
          restore-keys: |
            deriveddata-ci-${{ hashFiles('DayPage.xcodeproj/project.pbxproj') }}-
            deriveddata-ci-

      # GeneratedSecrets.swift 已提交到仓库（包含占位值）
      # CI 构建不需要真实 key，直接使用已提交版本即可
      # 如果文件意外缺失，用空占位值生成
      - name: Ensure GeneratedSecrets.swift exists
        run: |
          # Always overwrite with a CI placeholder that satisfies generate_secrets.sh's
          # validity check (grep for 'supabaseURL: String = "https://').
          mkdir -p DayPage/Config
          cat > DayPage/Config/GeneratedSecrets.swift << 'SWIFT'
          // CI placeholder — real values injected at runtime via .env
          enum Secrets {
              static let dashScopeApiKey: String = ""
              static let dashScopeBaseURL: String = ""
              static let dashScopeModel: String = ""
              static let openAIWhisperApiKey: String = ""
              static let openWeatherApiKey: String = ""
              static let supabaseURL: String = "https://placeholder.supabase.co"
              static let supabaseAnonKey: String = ""
          }
          SWIFT

      - name: Build (simulator, CODE_SIGNING_ALLOWED=NO)
        run: |
          set -o pipefail
          # Prefer iPhone 17, fall back to newest available iPhone simulator
          DEST=$(xcrun simctl list devices available -j \
            | python3 -c "
import json, sys
d = json.load(sys.stdin)
devices = []
for runtime, devs in d['devices'].items():
    for dev in devs:
        if dev.get('isAvailable') and 'iPhone' in dev['name']:
            devices.append(dev['name'])
# Prefer iPhone 17, then highest number
preferred = [n for n in devices if 'iPhone 17' in n]
if preferred:
    print(preferred[0])
elif devices:
    devices.sort(key=lambda x: [int(c) if c.isdigit() else c for c in x.split()])
    print(devices[-1])
else:
    print('iPhone 16')
" 2>/dev/null || echo "iPhone 16")
          echo "Using simulator: $DEST"
          xcodebuild \
            -scheme DayPage \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=$DEST" \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_CONTENT_PROTECTION=NO \
            CONFIGURATION_BUILD_DIR=$PWD/build/Products \
            build 2>&1 | tee build.log
          grep 'BUILD SUCCEEDED' build.log

      - name: Export built .app path
        id: app_path
        run: |
          APP=$(find build/Products -name "DayPage.app" -maxdepth 3 | head -1)
          echo "app_path=$APP" >> "$GITHUB_OUTPUT"
          echo "Found .app: $APP"

      - name: Upload .app for UI tests
        uses: actions/upload-artifact@v4
        with:
          name: DayPage-app-${{ github.sha }}
          path: build/Products
          retention-days: 1

  ui-tests:
    name: Maestro UI Tests
    runs-on: macos-15
    needs: build
    # 仅 PR 和定时任务运行 UI 测试（push 到非 main 分支跳过，加速普通开发循环）
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    permissions:
      contents: read
      pull-requests: write   # 允许发 PR comment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi

      - name: Download built .app
        uses: actions/download-artifact@v4
        with:
          name: DayPage-app-${{ github.sha }}
          path: build/Products

      - name: Install Maestro
        run: |
          export MAESTRO_VERSION=1.39.0
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Boot iPhone Simulator
        run: |
          UDID=$(xcrun simctl list devices available -j \
            | python3 -c "
import json, sys
d = json.load(sys.stdin)
iphones = []
for runtime, devs in d['devices'].items():
    for dev in devs:
        if 'iPhone' in dev.get('name','') and dev.get('isAvailable'):
            iphones.append((dev['name'], dev['udid']))
# Prefer iPhone 17, otherwise pick highest numbered iPhone
preferred = [(n, u) for n, u in iphones if 'iPhone 17' in n]
if preferred:
    print(preferred[0][1])
elif iphones:
    iphones.sort(key=lambda x: [int(c) if c.isdigit() else c for c in x[0].split()])
    print(iphones[-1][1])
")
          echo "Booting simulator UDID: $UDID"
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
          # 等待 Simulator 就绪
          xcrun simctl bootstatus "$UDID" -b

      - name: Install app on Simulator
        run: |
          APP=$(find build/Products -name "DayPage.app" -maxdepth 3 | head -1)
          echo "Installing: $APP"
          xcrun simctl install "$SIMULATOR_UDID" "$APP"

      - name: Run Maestro flows
        id: maestro
        env:
          MAESTRO_DEVICE_ID: ${{ env.SIMULATOR_UDID }}
        run: |
          mkdir -p maestro-results
          maestro test flows/ \
            --format junit \
            --output maestro-results/report.xml \
            --debug-output maestro-results/debug \
            || echo "MAESTRO_FAILED=true" >> "$GITHUB_ENV"

      - name: Upload Maestro results & screenshots
        if: always()
        id: upload_results
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results-${{ github.sha }}
          path: maestro-results/
          retention-days: 7

      - name: Comment on PR with test results
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ARTIFACT_URL: ${{ steps.upload_results.outputs.artifact-url }}
        run: |
          if [ "${MAESTRO_FAILED}" = "true" ]; then
            ICON="❌"
            STATUS="Failed"
          else
            ICON="✅"
            STATUS="Passed"
          fi

          # 收集截图文件名（最多 5 张，debug output 目录下的 screenshots）
          SCREENSHOTS=$(find maestro-results/debug -name "*.png" 2>/dev/null | head -5 || true)
          SCREENSHOT_LIST=""
          if [ -n "$SCREENSHOTS" ]; then
            SCREENSHOT_LIST="\n\n**Screenshots** (from last failed step):\n"
            for f in $SCREENSHOTS; do
              NAME=$(basename "$f")
              SCREENSHOT_LIST+="- \`$NAME\`\n"
            done
            SCREENSHOT_LIST+="\n[📁 Download all screenshots & report]($ARTIFACT_URL)"
          fi

          BODY="${ICON} **Maestro UI Tests ${STATUS}**

          | | |
          |---|---|
          | Flows | \`flows/\` |
          | Device | iPhone 17 Simulator |
          | Run | [View logs](${RUN_URL}) |
          ${SCREENSHOT_LIST}"

          gh pr comment "$PR_NUMBER" \
            --body "$(printf '%s' "$BODY")" \
            --edit-last 2>/dev/null \
            || gh pr comment "$PR_NUMBER" --body "$(printf '%s' "$BODY")"

      - name: Fail job if Maestro tests failed
        if: env.MAESTRO_FAILED == 'true'
        run: exit 1
