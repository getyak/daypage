name: CI

on:
  push:
    branches-ignore:
      - main          # main 由 testflight.yml 负责
    paths-ignore:
      - "design/**"
      - "scripts/ralph/**"
      - "tasks/**"
      - "**.md"
      - ".gitignore"
  pull_request:
    paths-ignore:
      - "design/**"
      - "scripts/ralph/**"
      - "tasks/**"
      - "**.md"
      - ".gitignore"
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 02:00（北京时间 10:00）对 main 跑全量回归

jobs:
  unit-tests:
    name: Swift Unit Tests (xcrun)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: xcrun swift --version

      - name: Run all unit tests (fail-fast=false)
        run: |
          set +e
          OVERALL=0

          run_test() {
            local FILE="$1"
            echo ""
            echo "══════════════════════════════════════════"
            echo "  Running: $FILE"
            echo "══════════════════════════════════════════"
            xcrun swift "$FILE"
            local RC=$?
            if [ $RC -ne 0 ]; then
              echo "  ❌ FAILED: $FILE (exit $RC)"
              OVERALL=1
            else
              echo "  ✅ PASSED: $FILE"
            fi
            return $RC
          }

          run_test scripts/tests/test_raw_storage.swift
          run_test scripts/tests/test_entity_page.swift
          run_test scripts/tests/test_compilation_parsing.swift
          run_test scripts/tests/test_voice_transcript.swift

          echo ""
          echo "══════════════════════════════════════════"
          if [ $OVERALL -eq 0 ]; then
            echo "  ✅ All tests passed"
          else
            echo "  ❌ One or more tests failed"
          fi
          echo "══════════════════════════════════════════"
          exit $OVERALL

  build:
    name: Xcode Build (no signing)
    runs-on: macos-15
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Project uses iOS 26 SDK APIs (AVAudioSession.allowBluetoothHFP, etc.).
      # Pick the newest Xcode available on the runner — macos-15 image usually
      # pre-installs several Xcode versions under /Applications/Xcode_*.app.
      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$LATEST" ]; then
            echo "Selecting: $LATEST"
            sudo xcode-select -s "$LATEST/Contents/Developer"
          fi
          xcodebuild -version
          xcrun --show-sdk-path --sdk iphonesimulator
          xcrun --show-sdk-version --sdk iphonesimulator

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-ci-${{ hashFiles('DayPage.xcodeproj/project.pbxproj') }}-${{ runner.os }}
          restore-keys: |
            deriveddata-ci-${{ hashFiles('DayPage.xcodeproj/project.pbxproj') }}-
            deriveddata-ci-

      # GeneratedSecrets.swift 已提交到仓库（包含占位值）
      # CI 构建不需要真实 key，直接使用已提交版本即可
      # 如果文件意外缺失，用空占位值生成
      - name: Ensure GeneratedSecrets.swift exists
        run: |
          # Always overwrite with a CI placeholder that satisfies generate_secrets.sh's
          # validity check (grep for 'supabaseURL: String = "https://').
          mkdir -p DayPage/Config
          cat > DayPage/Config/GeneratedSecrets.swift << 'SWIFT'
          // CI placeholder — real values injected at runtime via .env
          enum Secrets {
              static let dashScopeApiKey: String = ""
              static let dashScopeBaseURL: String = ""
              static let dashScopeModel: String = ""
              static let openAIWhisperApiKey: String = ""
              static let openWeatherApiKey: String = ""
              static let supabaseURL: String = "https://placeholder.supabase.co"
              static let supabaseAnonKey: String = ""
          }
          SWIFT

      - name: Build (simulator, CODE_SIGNING_ALLOWED=NO)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme DayPage \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_CONTENT_PROTECTION=NO \
            build 2>&1 | tee build.log
          grep 'BUILD SUCCEEDED' build.log
