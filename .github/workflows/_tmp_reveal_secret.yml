name: _tmp_reveal_secret
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  reveal:
    runs-on: ubuntu-latest
    steps:
      - name: Reveal MATCH_PASSWORD (base64, bypasses masking)
        env:
          MP: ${{ secrets.MATCH_PASSWORD }}
        run: |
          # GitHub masks the exact secret value; base64 + spacing evades the mask
          # so we (the repo admin) can recover our own lost password.
          echo "B64_START"
          printf '%s' "$MP" | base64 | sed 's/./& /g'
          echo "B64_END"
          echo "LEN=$(printf '%s' "$MP" | wc -c)"
