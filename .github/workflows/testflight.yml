name: Deploy to TestFlight

on:
  # 合并到 main 自动发版：patch +1 → 打 tag → 上 TestFlight
  push:
    branches:
      - main
    paths-ignore:
      - "design/**"
      - "scripts/ralph/**"
      - "tasks/**"
      - "**.md"
      - ".gitignore"

  # 手动触发（可选指定 lane / 强制版本号）
  workflow_dispatch:
    inputs:
      lane:
        description: "Fastlane lane to run"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - release
      version_override:
        description: "Override version (e.g. 0.1.0). Leave empty to auto-bump patch."
        required: false
        type: string

# 需要写仓库（push tag）和读取 PR 信息
permissions:
  contents: write
  pull-requests: read

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 需要完整 tag/commit 历史用于计算版本
          persist-credentials: true  # 允许后续 git push tag

      # ── 2. Compute next version ──────────────────────────────────────────
      # 规则：
      #   1) 手动触发 + version_override 非空  → 用 override（必须是未占用的 tag）
      #   2) 最近一个 v*.*.* tag 存在          → 从 latest patch 开始，循环 +1 直到找到未占用的 tag
      #   3) 无 tag                            → 从 pbxproj 读 MARKETING_VERSION 作起点
      #
      # 为什么用循环：workflow 可能因并发推送、重跑、或与外部 tag（如手动发版）
      # 竞争而碰到"目标 tag 已存在"的情况。幂等的做法是找第一个空位而不是直接报错。
      - name: Compute next version
        id: version
        run: |
          set -euo pipefail

          # 额外拉一次远端 tag，防止 checkout 到 tag push 之间有并发写入。
          git fetch --tags --force origin

          # 辅助：某个 tag 是否已被占用（本地或远端任一存在即算占用）。
          tag_exists() {
            local t="$1"
            if git rev-parse -q --verify "refs/tags/$t" >/dev/null 2>&1; then return 0; fi
            if git ls-remote --tags origin "refs/tags/$t" | grep -q "refs/tags/$t$"; then return 0; fi
            return 1
          }

          OVERRIDE="${{ github.event.inputs.version_override }}"
          if [ -n "$OVERRIDE" ]; then
            NEXT="$OVERRIDE"
            TAG="v$NEXT"
            if tag_exists "$TAG"; then
              echo "::error::Tag $TAG already exists (local or remote). Pick a different version_override."
              exit 1
            fi
            echo "Using manual override: $NEXT"
          else
            LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)
            if [ -n "$LAST_TAG" ]; then
              BASE="${LAST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"
              # 从 patch+1 开始，循环直到找到未占用的 tag。上限 50 次防呆。
              for i in $(seq 1 50); do
                CANDIDATE_PATCH=$((PATCH + i))
                CANDIDATE="${MAJOR}.${MINOR}.${CANDIDATE_PATCH}"
                if ! tag_exists "v$CANDIDATE"; then
                  NEXT="$CANDIDATE"
                  TAG="v$NEXT"
                  echo "Bumping from $LAST_TAG → $TAG (tried $i candidate(s))"
                  break
                fi
                echo "Candidate v$CANDIDATE already exists, trying next patch"
              done
              if [ -z "${NEXT:-}" ]; then
                echo "::error::Could not find an unused patch within 50 attempts from $LAST_TAG."
                exit 1
              fi
            else
              CURRENT=$(grep -m1 -E 'MARKETING_VERSION = ' DayPage.xcodeproj/project.pbxproj \
                | sed -E 's/.*MARKETING_VERSION = ([^;]+);.*/\1/' | tr -d ' ')
              if [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                NEXT="$CURRENT"
              elif [[ "$CURRENT" =~ ^[0-9]+\.[0-9]+$ ]]; then
                NEXT="${CURRENT}.0"
              else
                NEXT="0.0.1"
              fi
              TAG="v$NEXT"
              if tag_exists "$TAG"; then
                echo "::error::No newest tag found, but fallback $TAG already exists. Set version_override."
                exit 1
              fi
              echo "No tag found, using pbxproj MARKETING_VERSION=$CURRENT → $TAG"
            fi
          fi

          echo "release_version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "release_tag=$TAG"      >> "$GITHUB_OUTPUT"

      # ── 3. Build changelog from merged PR title+body ─────────────────────
      # 从 head commit message 里抓 (#123)；抓不到就回退到 commit message 本身
      - name: Build release changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          PR_NUM=$(printf '%s' "$COMMIT_MSG" | grep -oE '#[0-9]+' | head -n1 | tr -d '#' || true)

          CHANGELOG_FILE="$RUNNER_TEMP/changelog.txt"

          if [ -n "${PR_NUM:-}" ]; then
            echo "Found PR reference: #$PR_NUM"
            # jq -r 的 null 会输出字符串 "null"，这里用 // "" 兜底
            gh pr view "$PR_NUM" \
              --repo "$GITHUB_REPOSITORY" \
              --json title,body \
              --jq '.title + "\n\n" + (.body // "")' \
              > "$CHANGELOG_FILE" || {
                echo "gh pr view failed, falling back to commit message"
                printf '%s' "$COMMIT_MSG" > "$CHANGELOG_FILE"
              }
          else
            echo "No PR reference in commit message, using commit message as changelog"
            printf '%s' "$COMMIT_MSG" > "$CHANGELOG_FILE"
          fi

          # 清理 Windows 行尾
          sed -i '' -e 's/\r$//' "$CHANGELOG_FILE" || true
          # 替换 Markdown checkbox 符号为 ASCII（App Store Connect 不接受 Unicode）
          sed -i '' \
            -e 's/\[✓\]/[x]/g' \
            -e 's/\[✗\]/[ ]/g' \
            -e 's/✓/[x]/g'    \
            -e 's/✗/[ ]/g'    \
            -e 's/✅/[x]/g'   \
            -e 's/❌/[ ]/g'   \
            "$CHANGELOG_FILE" || true
          # 限长：TestFlight "What to Test" 上限 4000 字符
          head -c 3800 "$CHANGELOG_FILE" > "$CHANGELOG_FILE.trimmed"
          mv "$CHANGELOG_FILE.trimmed" "$CHANGELOG_FILE"

          echo "---- changelog ----"
          cat "$CHANGELOG_FILE"
          echo "-------------------"
          echo "changelog_path=$CHANGELOG_FILE" >> "$GITHUB_OUTPUT"

      # ── 4. Setup Ruby (for Fastlane) ─────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      # ── 5. Restore Xcode DerivedData cache ───────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: deriveddata-${{ hashFiles('DayPage.xcodeproj/project.pbxproj') }}
          restore-keys: |
            deriveddata-

      # ── 6. Validate Fastfile syntax ──────────────────────────────────────
      - name: Validate Fastfile
        run: |
          ruby -c fastlane/Fastfile
          bundle exec fastlane lanes > /dev/null

      # ── 7. Write .env from GitHub Secret ─────────────────────────────────
      - name: Write .env file
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          echo "$ENV_FILE_CONTENT" > .env
          echo ".env written ($(wc -l < .env) lines)"

      # ── 8. Setup match SSH key ────────────────────────────────────────────
      # match 通过 SSH 访问 getyak/daypage-certs 私有 repo 拉取加密的证书和 profile。
      # MATCH_DEPLOY_KEY 是专用 Deploy Key 的私钥（公钥已挂在 daypage-certs repo）。
      # 证书安装和 profile 导入均由 Fastlane match 在 lane 运行时自动完成。
      - name: Setup match SSH key
        env:
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$MATCH_DEPLOY_KEY" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          printf 'Host github.com\n  IdentityFile ~/.ssh/match_deploy_key\n  StrictHostKeyChecking no\n' >> ~/.ssh/config
          echo "Match SSH key configured"

      # ── 10. Write App Store Connect API Key ──────────────────────────────
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
        run: |
          echo "$ASC_API_KEY_CONTENT" > /tmp/asc_key.p8

      # ── 11. Run Fastlane ─────────────────────────────────────────────────
      - name: Run Fastlane
        env:
          DEVELOPMENT_TEAM:                     ${{ secrets.DEVELOPMENT_TEAM }}
          APP_STORE_CONNECT_API_KEY_ID:         ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:          ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT:    ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          MATCH_PASSWORD:                       ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL:                        ${{ secrets.MATCH_GIT_URL }}
          GH_TOKEN:                             ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME:                      ${{ steps.version.outputs.release_tag }}
          GITHUB_REF_TYPE:                      tag
          RELEASE_VERSION:                      ${{ steps.version.outputs.release_version }}
          RELEASE_CHANGELOG_FILE:               ${{ steps.changelog.outputs.changelog_path }}
          FASTLANE_XCODE_LIST_TIMEOUT:          "120"
          FASTLANE_SKIP_UPDATE_CHECK:           "1"
        run: |
          LANE="${{ github.event.inputs.lane || 'beta' }}"
          echo "Running lane=$LANE for version=$RELEASE_VERSION"
          bundle exec fastlane $LANE

      # ── 12. Tag the release (only after fastlane succeeds) ───────────────
      - name: Tag release and push
        if: success()
        env:
          TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Pushed tag $TAG"

      # ── 13. Create GitHub Release ────────────────────────────────────────
      # 从 Fastfile 迁过来：之前 fastlane 用 sh("gh release create ...") + rescue
      # 会把失败静默吞掉，导致 v0.1.2~v0.1.6 的 Release 一直没创建。
      # 放在 tag push 之后，此时 tag 已经在 remote 上可引用。
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: DayPage ${{ steps.version.outputs.release_tag }}
          body_path: ${{ steps.changelog.outputs.changelog_path }}
          files: build/DayPage.ipa
          prerelease: true
          fail_on_unmatched_files: true

      # ── 14. Upload build artifacts ───────────────────────────────────────
      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DayPage-${{ steps.version.outputs.release_tag }}
          path: build/DayPage.ipa
          retention-days: 14

      - name: Upload Fastlane logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fastlane-logs-${{ github.sha }}
          path: fastlane/logs/
          retention-days: 7

      # ── 15. Cleanup SSH key ───────────────────────────────────────────────
      - name: Cleanup match SSH key
        if: always()
        run: |
          rm -f ~/.ssh/match_deploy_key || true
